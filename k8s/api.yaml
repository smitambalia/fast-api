apiVersion: apps/v1
kind: Deployment
metadata:
  name: fast-api
  namespace: fast-api
  labels:
    app: fast-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fast-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fast-api
    spec:
      containers:
        - name: fast-api
          image: smitambalia/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: CORS_ORIGINS
              value: "http://192.168.1.11:30080,http://127.0.0.1:30080,http://localhost:3000"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fast-api
  namespace: fast-api
  labels:
    app: fast-api
spec:
  type: NodePort
  selector:
    app: fast-api
  ports:
    - name: http
      port: 8001
      targetPort: http
      nodePort: 30081
